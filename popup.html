<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Studio</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1 class="title">
        <span class="logo-icon">🔌</span>
        API Studio
      </h1>
      <div class="header-actions">
        <button class="language-toggle" id="languageToggleBtn" type="button" title="Switch language">EN</button>
        <button class="btn btn-primary" id="addRuleBtn" data-i18n="popup.newRule">+ 新建规则</button>
      </div>
    </header>

    <div class="capture-section" id="captureSection" style="display:none">
      <div class="capture-header">
        <span class="capture-title" data-i18n="popup.capturedTitle">📡 从 F12 Network 捕获</span>
        <button class="btn btn-text btn-sm" id="clearCaptureBtn" data-i18n="common.clear">清空</button>
      </div>
      <div class="capture-list" id="captureList"></div>
    </div>

    <div class="rule-list" id="ruleList">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📋</div>
        <p data-i18n="popup.emptyTitle">暂无规则</p>
        <p class="empty-hint" data-i18n="popup.emptyHint">点击上方按钮添加接口模拟规则</p>
      </div>
    </div>

    <footer class="footer" id="footer">
      <span id="statsText" data-i18n="popup.statsShort">共 0 条规则</span>
    </footer>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modalTitle" data-i18n="popup.modalNew">新建规则</h2>
        <button class="btn-icon" id="closeModalBtn">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-section">
          <label class="form-label" data-i18n="popup.ruleName">规则名称</label>
          <input type="text" class="form-input" id="ruleName" placeholder="例如：用户信息接口模拟" data-i18n-placeholder="popup.ruleNamePlaceholder">
        </div>

        <div class="form-section">
          <label class="form-label" data-i18n="popup.method">请求方法</label>
          <select class="form-select" id="ruleMethod">
            <option value="ANY" data-i18n="popup.anyMethod">任意方法</option>
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
            <option value="PATCH">PATCH</option>
          </select>
        </div>

        <div class="form-section">
          <label class="form-label" data-i18n="popup.urlPath">URL 路径</label>
          <input type="text" class="form-input" id="urlPattern" placeholder="/api/user/info">
        </div>

        <div class="form-section">
          <label class="form-label" data-i18n="popup.statusCode">响应状态码</label>
          <input type="number" class="form-input form-input-short" id="responseStatus" value="200" min="100" max="599">
        </div>

        <div class="form-section">
          <label class="form-label" data-i18n="popup.delay">响应延迟 (毫秒)</label>
          <input type="number" class="form-input form-input-short" id="responseDelay" value="0" min="0" max="30000" placeholder="0">
        </div>

        <div class="form-section">
          <label class="form-label" data-i18n="popup.headers">响应头</label>
          <div class="header-rows" id="headerRows">
            <div class="header-row">
              <input type="text" class="form-input form-input-sm" placeholder="Key" value="Content-Type">
              <input type="text" class="form-input form-input-sm" placeholder="Value" value="application/json">
              <button class="btn-icon btn-icon-sm remove-header-btn">✕</button>
            </div>
          </div>
          <button class="btn btn-text" id="addHeaderBtn" data-i18n="popup.addHeader">+ 添加响应头</button>
        </div>

        <div class="form-section">
          <label class="form-label" data-i18n="popup.body">响应体</label>
          <textarea class="form-textarea" id="responseBody" rows="6" placeholder='{"data": "模拟返回数据"}' data-i18n-placeholder="popup.responseBodyPlaceholder" spellcheck="false"></textarea>
          <div class="textarea-actions">
            <button class="btn btn-text" id="formatJsonBtn" data-i18n="popup.formatJson">格式化 JSON</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelModalBtn" data-i18n="common.cancel">取消</button>
        <button class="btn btn-danger" id="deleteRuleBtn" style="display:none" data-i18n="popup.deleteRule">删除规则</button>
        <button class="btn btn-primary" id="saveRuleBtn" data-i18n="popup.saveRule">保存规则</button>
      </div>
    </div>
  </div>

  <script src="compat.js"></script>
  <script src="popup.js"></script>
</body>
</html>
